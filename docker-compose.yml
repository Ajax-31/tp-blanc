version: '3.8'
services:
  api:
    # Option A (recommandée en TP): rebuild depuis le code
    build: .
    # Option B (si vous voulez verrouiller l'image):
    # image: supertask:v1
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL 
    environment:
      - PORT=3000

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:alpine
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
